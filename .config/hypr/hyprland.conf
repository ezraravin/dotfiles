################
### MONITORS ###
################

monitor=HDMI-A-1,2560x1080@75,auto,1.0
monitor=DP-1,2560x1440@60,auto,1.0,transform,3
monitor=eDP-1,1600x900@60,auto,1.0

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$menu = wofi --show drun
$refreshWallpaper = ~/.config/hypr/scripts/random-wallpapers.sh

#################
### AUTOSTART ###
#################

exec-once = nm-applet
exec-once = $terminal 
exec-once = waybar
exec-once = hyprpaper
exec-once = spotify
exec-once = brave
exec-once = Chatbox
exec-once = spotify-adblock
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = brightnessctl --restore  # Saves/restores brightness on reboot
exec-once = while true; do sleep 3600; ~/.config/hypr/scripts/random-wallpapers.sh; done # Change wallpaper every 60 minutes
exec-once = hypridle

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    allow_tearing = false
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.95
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    vfr = true  # Saves CPU/GPU (VSync-like but more efficient)
}


#############
### INPUT ###
#############
input {
    repeat_rate = 60  # High repeat rate (in characters per second)
    repeat_delay = 200 # Low delay before repeat starts (in milliseconds)
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }
}
gestures {
    workspace_swipe = false
}

###################
### KEYBINDINGS ###
###################

# Brightness Control (Improved)
bindel = , XF86MonBrightnessUp, exec, brightnessctl -c backlight set +10% && notify-send "Brightness: $(brightnessctl -c backlight g)%"
bindel = , XF86MonBrightnessDown, exec, brightnessctl -c backlight set 10%- && notify-send "Brightness: $(brightnessctl -c backlight g)%"

$mainMod = SUPER # Sets "Windows" key as main modifier
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Y, togglefloating,
bind = $mainMod, Space, exec, $menu
bind = $mainMod, D, pseudo, # dwindle
bind = $mainMod, S, togglesplit, # dwindle
bind = $mainMod, F, fullscreen
bind = $mainMod, R, exec, $refreshWallpaper
bind = $mainMod SHIFT, S, exec, IMG=~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && grim -g "$(slurp)" "$IMG" && wl-copy < "$IMG" && notify-send "Screenshot Taken" "Saved and copied to clipboard!"

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Moving windows
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, j, swapwindow, d
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, l, swapwindow, r

# Window resizing
bind = $mainMod, left, resizeactive, -60 0
bind = $mainMod, down, resizeactive, 0 60
bind = $mainMod, up, resizeactive, 0 -60
bind = $mainMod, right, resizeactive, 60 0

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod SHIFT, M, movetoworkspace, special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Bind Workspace
windowrulev2 = workspace 1, class:^(kitty)$
windowrulev2 = workspace 1, class:^(Brave-browser)$
windowrulev2 = workspace 2, class:^(xyz.chatboxapp.app)$
windowrulev2 = workspace 3, class:^(com.obsproject.Studio)$
windowrulev2 = workspace 4, class:^(org.kde.kdenlive)$
windowrulev2 = workspace special:magic, class:^(Spotify)$

# Render with NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
